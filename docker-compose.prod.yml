version: "3.9"

networks:
  galaxyvast_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  redis_data:
    driver: local
  backup_data:
    driver: local

services:
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save 900 1 --save 300 10 --appendonly yes --requirepass ${REDIS_PASSWORD} --loglevel warning
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - galaxyvast_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.5"
    logging:
      driver: json-file
      options: {max-size: "20m", max-file: "5"}
    security_opt:
      - no-new-privileges:true
    user: "999:999"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - GIT_SHA=${GIT_SHA:-unknown}
    image: galaxyvast-api:${APP_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    networks:
      - galaxyvast_net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits: {memory: 2G, cpus: "2.0"}
        reservations: {memory: 512M, cpus: "0.5"}
      update_config: {parallelism: 1, delay: 10s, failure_action: rollback, order: start-first}
    ulimits:
      nofile: {soft: 65536, hard: 65536}
    logging:
      driver: json-file
      options: {max-size: "50m", max-file: "5"}
    security_opt:
      - no-new-privileges:true

  telegram_bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    image: galaxyvast-bot:${APP_VERSION:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    networks:
      - galaxyvast_net
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits: {memory: 512M, cpus: "1.0"}
    logging:
      driver: json-file
      options: {max-size: "20m", max-file: "3"}
    security_opt:
      - no-new-privileges:true

  dashboard:
    build: {context: ./dashboard, dockerfile: Dockerfile}
    image: galaxyvast-dashboard:${APP_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8501:8501"
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - API_BASE_URL=http://api:8000
      - PYTHONPATH=/app
    networks:
      - galaxyvast_net
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits: {memory: 1G, cpus: "1.0"}
    logging:
      driver: json-file
      options: {max-size: "20m", max-file: "3"}
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-https://yourdomain.com}
    image: galaxyvast-frontend:${APP_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    networks:
      - galaxyvast_net
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits: {memory: 256M, cpus: "0.5"}
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}
    security_opt:
      - no-new-privileges:true

  backup:
    image: redis:7.4-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data:ro
      - backup_data:/backups
    networks:
      - galaxyvast_net
    depends_on:
      - redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    entrypoint: ["/bin/sh", "-c"]
    command: ["while true; do DATE=$(date +%Y%m%d_%H%M%S); redis-cli -h redis -a $REDIS_PASSWORD --rdb /backups/redis_${DATE}.rdb 2>/dev/null || true; find /backups -name '*.rdb' -mtime +7 -delete; echo backup $DATE; sleep 86400; done"]
    deploy:
      resources:
        limits: {memory: 64M, cpus: "0.1"}

  prometheus:
    image: prom/prometheus:v2.54.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    networks:
      - galaxyvast_net
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits: {memory: 512M, cpus: "0.5"}
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    networks:
      - galaxyvast_net
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits: {memory: 512M, cpus: "0.5"}
    security_opt:
      - no-new-privileges:true
