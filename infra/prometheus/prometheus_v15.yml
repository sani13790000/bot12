global:
  scrape_interval:     15s
  evaluation_interval: 30s
  scrape_timeout:      10s
  external_labels:
    env:     'production'
    service: 'mt5trading-bot'

rule_files:
  - "alert_rules_v15.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      timeout: 5s
      api_version: v2

scrape_configs:
  - job_name: 'mt5trading-api'
    scrape_interval: 15s
    metrics_path: '/admin/metrics/prometheus'
    bearer_token_file: /etc/prometheus/api_token
    static_configs:
      - targets: ['api:8000']

  - job_name: 'postgres'
    scrape_interval: 30s
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'node'
    scrape_interval: 30s
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'nginx'
    scrape_interval: 30s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['nginx-exporter:9113']

  - job_name: 'redis'
    scrape_interval: 30s
    static_configs:
      - targets: ['redis-exporter:9121']
