global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    env: production
    app: galaxyvast

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
      timeout: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: galaxyvast-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 15s

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
    scrape_interval: 30s

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
    scrape_interval: 30s
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
    scrape_interval: 60s

  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]
    scrape_interval: 30s
