global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    env: production
    app: galaxyvast

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # Galaxy Vast API
  - job_name: 'api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/admin/metrics/prometheus'
    bearer_token_file: /etc/prometheus/api_token
    scrape_interval: 15s
    scrape_timeout:  10s

  # PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Node / system metrics
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Nginx
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:9113']

  # cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
