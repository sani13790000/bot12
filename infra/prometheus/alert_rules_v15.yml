groups:
  - name: saas_license_alerts
    interval: 30s
    rules:
      - alert: LicenseFailureSpike
        expr: increase(license_failures_total_total[5m]) > 5
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "License validation failures spiking"
          description: "{{ $value }} license failures in last 5 minutes."
          runbook: "https://docs.mt5trading.io/runbooks/license-failure"
      - alert: LicenseExpiringSoon
        expr: license_days_remaining < 7
        for: 1h
        labels:
          severity: warning
          team: customer_success
        annotations:
          summary: "License expiring in {{ $value }} days"
          description: "Customer license will expire soon."
  - name: saas_heartbeat_alerts
    interval: 60s
    rules:
      - alert: HeartbeatLossDetected
        expr: increase(heartbeat_losses_total_total[5m]) > 0
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "EA heartbeat loss detected"
          description: "{{ $value }} heartbeat(s) missing. EA may have crashed."
          runbook: "https://docs.mt5trading.io/runbooks/heartbeat-loss"
      - alert: HeartbeatGapHigh
        expr: histogram_quantile(0.95, heartbeat_gap_s) > 120
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Heartbeat gap p95 > 120s"
          description: "EA heartbeat gaps are growing."
  - name: saas_kill_switch_alerts
    interval: 10s
    rules:
      - alert: KillSwitchActive
        expr: kill_switch_active == 1
        for: 0m
        labels:
          severity: critical
          team: trading
          pagerduty: "true"
        annotations:
          summary: "KILL SWITCH IS ACTIVE - ALL TRADING HALTED"
          description: "Kill switch activated. All EA trading stopped immediately."
          runbook: "https://docs.mt5trading.io/runbooks/kill-switch"
      - alert: KillSwitchActivationSpike
        expr: increase(kill_switch_activations_total_total[1h]) > 3
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Kill switch activated {{ $value }}x in last hour"
          description: "Repeated kill switch activations indicate systemic issue."
  - name: saas_drawdown_alerts
    interval: 30s
    rules:
      - alert: DrawdownCritical
        expr: equity_drawdown_pct >= 10
        for: 0m
        labels:
          severity: critical
          team: risk
          pagerduty: "true"
        annotations:
          summary: "CRITICAL: Equity drawdown {{ $value }}%"
          description: "Drawdown exceeds 10%. Review immediately."
          runbook: "https://docs.mt5trading.io/runbooks/drawdown-critical"
      - alert: DrawdownWarning
        expr: equity_drawdown_pct >= 5 and equity_drawdown_pct < 10
        for: 5m
        labels:
          severity: warning
          team: risk
        annotations:
          summary: "WARNING: Equity drawdown {{ $value }}%"
          description: "Drawdown approaching critical threshold."
      - alert: DrawdownAlertSpike
        expr: increase(drawdown_alerts_total_total[1h]) > 10
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "{{ $value }} drawdown alerts in last hour"
          description: "Repeated drawdown alerts - volatile market conditions."
  - name: saas_reconciliation_alerts
    interval: 60s
    rules:
      - alert: ReconciliationMismatch
        expr: reconciliation_mismatches_total_total > 0
        for: 0m
        labels:
          severity: critical
          team: trading
          pagerduty: "true"
        annotations:
          summary: "Position reconciliation mismatch detected"
          description: "Broker and local positions diverged. Manual review required."
          runbook: "https://docs.mt5trading.io/runbooks/reconciliation-mismatch"
      - alert: ReconciliationNotRunning
        expr: time() - reconciliation_last_run_ts > 3600
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Reconciliation has not run in > 1 hour"
          description: "Position reconciliation check is overdue."
      - alert: ReconciliationSlow
        expr: histogram_quantile(0.95, reconciliation_duration_s) > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Reconciliation p95 > 30s"
          description: "Position reconciliation is taking too long."
  - name: saas_api_alerts
    interval: 30s
    rules:
      - alert: APIDown
        expr: up{job="mt5trading-api"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
          pagerduty: "true"
        annotations:
          summary: "MT5Trading API is down"
          description: "FastAPI backend not responding to health checks."
      - alert: APIHighErrorRate
        expr: rate(http_5xx_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "API 5xx error rate > 10%"
          description: "High error rate. Check logs immediately."
      - alert: APIHighLatency
        expr: histogram_quantile(0.95, http_request_duration_seconds) > 2.0
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "API p95 latency > 2s"
          description: "API response times are degraded."
  - name: saas_trading_alerts
    interval: 30s
    rules:
      - alert: HighTradeRejectionRate
        expr: rate(trades_rejected_total_total[5m]) / rate(trades_submitted_total_total[5m]) > 0.2
        for: 5m
        labels:
          severity: warning
          team: trading
        annotations:
          summary: "Trade rejection rate > 20%"
          description: "High proportion of rejections. Check risk gate or broker."
      - alert: DeadLetterQueueGrowing
        expr: increase(dead_letter_total_total[10m]) > 5
        for: 0m
        labels:
          severity: warning
          team: trading
        annotations:
          summary: "Dead letter orders: {{ $value }} in last 10m"
          description: "Orders dead-lettered. Check broker and retry logic."
