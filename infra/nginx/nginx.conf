# ============================================================
# infra/nginx/nginx.conf — Galaxy Vast AI Trading Platform
# P17-FIX-NGINX-1: server_tokens off
# P17-FIX-NGINX-2: security headers (HSTS/CSP/X-Frame/X-CTO/Referrer)
# P17-FIX-NGINX-3: rate limiting zones
# P17-FIX-NGINX-4z gzip on
# P17-FIX-NGINX-5: nginx-health stub_status endpoint
# P17-FIX-NGINX-6: SSL/TLS 1.2+ only
# P17-FIX-NGINX-7: proxy_pass to api:8000
# ============================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=60r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    server {
        listen 80;
        server_name _;
        location /nginx-health { access_log off; return 200 "OK\n"; add_header Content-Type text/plain; }
        location / { return 301 https://$host$request_uri; }
    }
    server {
        listen 443 ssl http2;
        server_name _;
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache   shared:SSL:50m;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; frame-ancestors 'none';" always;
        limit_conn conn_limit 20;
        location /nginx-health { access_log off; return 200 "OK\n"; add_header Content-Type text/plain; }
        location /stub_status { stub_status; allow 172.20.0.0/24; deny all; access_log off; }
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /health { proxy_pass http://api:8000; proxy_set_header Host $host; access_log off; }
        location / { proxy_pass http://frontend:80; proxy_http_version 1.1; proxy_set_header Host $host; }
    }
}
