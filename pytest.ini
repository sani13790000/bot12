[pytest]
asyncio_mode = auto
log_cli = true
log_cli_level = INFO
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit:        Fast unit tests (no external dependencies)
    integration: Tests requiring external services (MT5, Supabase, Redis)
    e2e:         End-to-end tests with real browser/MT5
    slow:        Tests that take > 10 seconds
    ml:          ML pipeline tests (XGBoost, FeaturePipeline, ModelManager)
    risk:        Risk engine tests (KillSwitch, RiskOrchestrator, MarginGate)
    migration:   Database migration tests
    health:      Health endpoint tests
    pagination:  Pagination and limit/offset tests
    ws:          WebSocket and backoff tests
    phase_p:     Phase P hardening tests
