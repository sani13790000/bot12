[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
markers =
    asyncio: marks tests as async (auto-applied)
    integration: marks integration tests (require DEMO mode)
    unit: marks pure unit tests (no I/O)
    slow: marks slow tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
