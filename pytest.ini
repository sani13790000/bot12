[pytest]
asyncio_mode = auto
testpaths = tests
markers =
    unit: unit tests (no external dependencies)
    integration: integration tests (may need DB/MT5)
    e2e: end-to-end tests (need running services)
    slow: tests that take more than 5 seconds
    ml: ML pipeline tests
    risk: risk engine tests
    migration: migration audit tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
log_cli = true
log_cli_level = WARNING
addopts = -v --tb=short
