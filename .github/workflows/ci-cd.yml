name: CI/CD
# Galaxy Vast AI Trading Platform — Full CI/CD pipeline

on:
  push:
    branches: [main, develop]
    tags: ["v.*"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/galaxyvast

jobs:
  lint-test:
    name: Lint + Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install
        run: pip install -r requirements.txt ruff pytest pytest-cov
      - name: Ruff lint
        run: ruff check backend/ --statistics
      - name: Tests + Coverage
        env:
          JWT_SECRET_KEY: ${{ secrets.CI_JWT_SECRET_KEY }}
        run: |
          pytest backend/tests/ \
            --cov=backend \
            --cov-report=xml \
            --cov-fail-under=70 \
            -x -q

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  docker:
    name: Docker Build + Push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint-test, security]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.IMAGE_BASE }}-api:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: GIT_SHA=${{ github.sha }}
          provenance: true
          sbom: true

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [docker]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/galaxyvast
            git pull origin develop
            export APP_VERSION=sha-${{ github.sha }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker system prune -f --volumes=false
      - name: Smoke test
        run: |
          sleep 20
          curl -sf "${{ vars.STAGING_URL }}/health/live"  || exit 1
          curl -sf "${{ vars.STAGING_URL }}/health/ready" || exit 1
      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          EMOJI="OK"; [[ "$STATUS" != "success" ]] && EMOJI="FAIL"
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}&text=${EMOJI} Staging ${STATUS}: sha-${{ github.sha }}" || true

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [docker, deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Blue/Green deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/galaxyvast
            git fetch --tags && git checkout ${{ github.ref_name }}
            export APP_VERSION=${{ github.ref_name }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --no-deps api
            sleep 30
            curl -sf http://localhost:8000/health/live  || { docker compose -f docker-compose.prod.yml restart api; exit 1; }
            curl -sf http://localhost:8000/health/ready || { docker compose -f docker-compose.prod.yml restart api; exit 1; }
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker system prune -f --volumes=false
      - name: Smoke test
        run: |
          sleep 20
          curl -sf "${{ vars.PRODUCTION_URL }}/health/live"  || exit 1
          curl -sf "${{ vars.PRODUCTION_URL }}/health/ready" || exit 1
      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          EMOJI="OK"; [[ "$STATUS" != "success" ]] && EMOJI="FAIL"
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}&text=${EMOJI} Production ${STATUS}: ${{ github.ref_name }}" || true
