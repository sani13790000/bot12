name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: Deploy target
        required: true
        default: staging
        type: choice
        options: [staging, production]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/galaxyvast
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis:
        image: redis:7.4-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      ENVIRONMENT: testing
      JWT_SECRET_KEY: ci-test-secret-32-chars-minimum!!
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_KEY: test-key
      REDIS_URL: redis://localhost:6379/0
      REDIS_PASSWORD: ""
      ALLOWED_ORIGINS: '["http://localhost:3000"]'
      APP_VERSION: ci-test
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx ruff mypy bandit pip-audit
      # DO-FIX-11: No || true — lint FAILS CI
      - name: Ruff lint
        run: ruff check backend/ --select=E,W,F,I --ignore=E501
      # DO-FIX-12: mypy type check
      - name: Type check
        run: mypy backend/ --ignore-missing-imports --no-strict-optional
      - name: Tests
        run: |
          pytest backend/tests/ \
            --tb=short \
            --cov=backend \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60 \
            -x -q
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      # DO-FIX-11: No || true
      - name: ESLint
        working-directory: frontend
        run: npm run lint
      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 3

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install scanners
        run: pip install bandit pip-audit
      # DO-FIX-13: SAST scan with JSON report
      - name: Bandit SAST
        run: bandit -r backend/ -ll -x backend/tests/ -f json -o bandit-report.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 7
      - name: pip-audit CVEs
        run: pip-audit -r requirements.txt --format json -o pip-audit-report.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 7
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  docker:
    name: Docker Build + Push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend, frontend, security]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          install: true
      - name: Login GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Meta API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}-api
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build + push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: GIT_SHA=${{ github.sha }}
          provenance: true
          sbom: true
      - name: Meta Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}-frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build + push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Meta Bot
        id: meta-bot
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}-bot
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
      - name: Build + push Bot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.bot
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-bot.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [docker]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/galaxyvast
            git pull origin develop
            export APP_VERSION=sha-${{ github.sha }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker system prune -f --volumes=false
      - name: Smoke test
        run: |
          sleep 20
          curl -sf "${{ vars.STAGING_URL }}/health/live"  || exit 1
          curl -sf "${{ vars.STAGING_URL }}/health/ready" || exit 1
      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          EMOJI="\u2705"; [[ "$STATUS" != "success" ]] && EMOJI="\u274c"
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}&text=${EMOJI} Staging ${STATUS}: sha-${{ github.sha }}" || true

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [docker, deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v4
      # DO-FIX-19: Blue/Green with rollback
      - name: Blue/Green deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/galaxyvast
            git fetch --tags && git checkout ${{ github.ref_name }}
            export APP_VERSION=${{ github.ref_name }}
            export GIT_SHA=${{ github.sha }}
            docker compose -f docker-compose.prod.yml pull
            # Roll out API first, verify, then rest
            docker compose -f docker-compose.prod.yml up -d --no-deps api
            sleep 30
            curl -sf http://localhost:8000/health/live  || { docker compose -f docker-compose.prod.yml restart api; exit 1; }
            curl -sf http://localhost:8000/health/ready || { docker compose -f docker-compose.prod.yml restart api; exit 1; }
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker system prune -f --volumes=false
            bash /opt/galaxyvast/scripts/backup.sh daily || true
      - name: Smoke test
        run: |
          sleep 20
          curl -sf "${{ vars.PRODUCTION_URL }}/health/live"  || exit 1
          curl -sf "${{ vars.PRODUCTION_URL }}/health/ready" || exit 1
      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          EMOJI="\u2705"; [[ "$STATUS" != "success" ]] && EMOJI="\u274c"
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}&text=${EMOJI} Production ${STATUS}: ${{ github.ref_name }}" || true
