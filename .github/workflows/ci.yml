name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies (skip heavy ML)
        run: |
          pip install --upgrade pip
          # Exclude torch, SB3, gymnasium (too large for CI), pandas-ta (beta)
          grep -v -E '^(torch|stable-baselines3|gymnasium|--extra-index|pandas-ta)' requirements.txt \
            | pip install -r /dev/stdin
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Syntax check all Python files
        run: |
          find backend dashboard -name '*.py' -print0 \
            | xargs -0 python -m py_compile

      - name: Run tests (all — including test_agents with mock)
        env:
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test-anon-key-for-ci-only
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key-for-ci-only
          JWT_SECRET_KEY: test-secret-key-minimum-32-characters-long
          TELEGRAM_BOT_TOKEN: 123456:test-token
          TELEGRAM_CHAT_ID: "123456789"
          LICENSE_KEY: test-license-key
          LICENSE_SALT: test-license-salt-for-ci
          ENVIRONMENT: development
          REDIS_URL: redis://localhost:6379/0
        run: |
          python -m pytest backend/tests/ -v --tb=short \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml \
            --ignore=backend/tests/test_backtest_engine.py

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          file: coverage.xml
          fail_ci_if_error: false

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check syntax
        run: |
          find . -name '*.py' -not -path './.git/*' -print0 \
            | xargs -0 python -m py_compile

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
        continue-on-error: false
