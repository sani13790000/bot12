name: Galaxy Vast CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies (CPU-only, no GPU)
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          SUPABASE_URL: http://localhost
          SUPABASE_ANON_KEY: test_anon_key_minimum_32_characters_long
          SUPABASE_SERVICE_ROLE_KEY: test_service_role_key_minimum_32_chars
          SUPABASE_DB_URL: postgresql://postgres:test@localhost:5432/postgres
          JWT_SECRET_KEY: test_jwt_secret_key_minimum_32_characters
          LICENSE_ENCRYPTION_KEY: test_license_encryption_key_32_chars
          LICENSE_SIGNATURE_KEY: test_license_signature_key_32_chars_
        run: |
          python -m pytest backend/tests/ -v --cov=backend --cov-report=term-missing --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check Python syntax
        run: |
          find backend -name "*.py" -exec python -m py_compile {} \;
          echo "All Python files syntax OK"

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build
