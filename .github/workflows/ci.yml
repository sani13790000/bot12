name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies (CPU torch, skip heavy ML)
        run: |
          pip install --upgrade pip
          # Install without torch/SB3/gymnasium for CI speed
          grep -v -E '^(torch|stable-baselines3|gymnasium|--extra-index)' requirements.txt > ci-requirements.txt
          pip install -r ci-requirements.txt

      - name: Set test environment variables
        run: |
          echo "SUPABASE_URL=https://test.supabase.co" >> $GITHUB_ENV
          echo "SUPABASE_ANON_KEY=test-anon-key" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=test-service-key" >> $GITHUB_ENV
          echo "SUPABASE_DB_URL=postgresql://postgres:test@localhost:5432/postgres" >> $GITHUB_ENV
          echo "JWT_SECRET_KEY=test-secret-key-for-unit-tests-only-32chars" >> $GITHUB_ENV
          echo "LICENSE_ENCRYPTION_KEY=test-enc-key-32chars-padded-here12" >> $GITHUB_ENV
          echo "LICENSE_SIGNATURE_KEY=test-sig-key-32chars-padded-here12" >> $GITHUB_ENV
          echo "LICENSE_SALT=test-salt-key-32chars-padded-here" >> $GITHUB_ENV
          echo "ENVIRONMENT=development" >> $GITHUB_ENV

      - name: Run tests with coverage
        run: |
          python -m pytest backend/tests/ -v --tb=short \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml \
            --ignore=backend/tests/test_agents.py

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check all Python files
        run: |
          find backend -name "*.py" -exec python -m py_compile {} \;
          echo "All Python files compiled successfully."

  frontend-build:
    runs-on: ubuntu-latest
    # Frontend failure does NOT block the pipeline
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
