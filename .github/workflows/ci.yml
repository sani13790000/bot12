name: Galaxy Vast AI — CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────
  # Job 1: Python Tests
  # ─────────────────────────────────────────────────────────
  test-python:
    name: Python Tests (pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov scikit-learn numpy

      - name: Run test suite
        run: |
          pytest backend/tests/ \
            -v \
            --tb=short \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --asyncio-mode=auto \
            -rN

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────
  # Job 2: Python syntax check (all backend files)
  # ─────────────────────────────────────────────────────────
  syntax-check:
    name: Python Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check syntax on all Python files
        run: |
          echo "=== Syntax check ==="
          find backend -name '*.py' | while read f; do
            python -m py_compile "$f" && echo "OK: $f" || echo "FAIL: $f"
          done
          find backend -name '*.py' | xargs python -m py_compile
          echo "All Python files passed syntax check."

  # ─────────────────────────────────────────────────────────
  # Job 3: Frontend build (optional, non-blocking)
  # ─────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build (Node.js)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
