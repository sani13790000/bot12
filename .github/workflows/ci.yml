name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis:
        image: redis:7.4-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      ENVIRONMENT: testing
      JWT_SECRET_KEY: ci-test-secret-key-not-for-production
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_KEY: test-key
      REDIS_URL: redis://localhost:6379/0
      ALLOWED_ORIGINS: '["http://localhost:3000"]'
      APP_VERSION: ci-test
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx ruff
      - name: Lint
        run: ruff check backend/ --select=E,W,F,I --ignore=E501 || true
      - name: Tests
        run: |
          pytest backend/tests/ \
            --tb=short \
            --cov=backend \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -x -q

  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint || true
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t galaxyvast-api:ci .
      - name: Build Frontend image
        run: docker build -f frontend/Dockerfile -t galaxyvast-frontend:ci frontend/
        env:
          VITE_API_URL: http://localhost:8000
