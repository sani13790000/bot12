version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: bot12-postgres
    environment:
      POSTGRES_USER: bot12
      POSTGRES_PASSWORD: bot12pass
      POSTGRES_DB: bot12
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot12"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: bot12-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: bot12-backend
    environment:
      DATABASE_URL: postgresql://bot12:bot12pass@postgres:5432/bot12
      REDIS_URL: redis://redis:6379/0
      MT5_ACCOUNT_ID: 5052866922
      MT5_SERVER: MetaQuotes-Demo
      MT5_PASSWORD: "@k3zDoHr"
      TELEGRAM_BOT_TOKEN: "AAHGWyj8hVN7QVTyVxu5jDyHjg7LhnwTsmw"
      TELEGRAM_USER_ID: "@k3zDoHr"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./logs:/app/logs

  # Frontend (Development)
  frontend:
    image: node:18-alpine
    container_name: bot12-frontend
    working_dir: /app
    command: npm run dev
    environment:
      VITE_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
