# =====================================================================
# Docker Compose - bot12
# =====================================================================
# برای اجرا: docker-compose up -d
# برای لاگ: docker-compose logs -f
# =====================================================================

version: "3.9"

services:

  # ----- سرور API -----
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bot12_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - API_SECRET_KEY=${API_SECRET_KEY}
      - LICENSE_SECRET_KEY=${LICENSE_SECRET_KEY}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./logs:/app/logs
      - ./backend:/app/backend
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - bot12_network

  # ----- ربات تلگرام -----
  telegram_bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: bot12_telegram
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ADMIN_CHAT_IDS=${TELEGRAM_ADMIN_CHAT_IDS}
      - API_BASE_URL=http://api:8000
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - bot12_network

  # ----- Redis Cache -----
  redis:
    image: redis:7.4-alpine
    container_name: bot12_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - bot12_network

  # ----- فرانت‌اند Dashboard -----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bot12_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - bot12_network

volumes:
  redis_data:

networks:
  bot12_network:
    driver: bridge
