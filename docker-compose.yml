version: '3.9'

services:

  redis:
    image: redis:7.4-alpine
    container_name: bot12_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme_redis}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly no
      --loglevel warning
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - bot12_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bot12_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health/live"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - bot12_net
    volumes:
      - model_data:/app/models
      - log_data:/app/logs

  telegram_bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: bot12_telegram
    restart: unless-stopped
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # Real healthcheck: verify polling loop is alive via heartbeat file
      # The heartbeat file is written every 30s by backend/telegram/heartbeat.py
      # If file is older than 120s, polling is considered dead
      test:
        - "CMD"
        - "python3"
        - "-c"
        - |
          import os, time, sys
          try:
              age = time.time() - os.path.getmtime('/tmp/bot_heartbeat')
              sys.exit(0 if age < 120 else 1)
          except FileNotFoundError:
              sys.exit(1)
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - bot12_net

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: bot12_dashboard
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8501:8501"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8501"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - bot12_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bot12_frontend
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - bot12_net

volumes:
  redis_data:
  model_data:
  log_data:

networks:
  bot12_net:
    driver: bridge
