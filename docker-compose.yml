# docker-compose.yml — Phase P fix
# BUG-P7: telegram-bot added as separate service (previously ran inside api container)
# BUG-O5: MODEL_DIR volume + env var

version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - MT5_LOGIN=${MT5_LOGIN}
      - MT5_PASSWORD=${MT5_PASSWORD}
      - MT5_SERVER=${MT5_SERVER}
      - MT5_DEMO_MODE=${MT5_DEMO_MODE:-true}
      - LICENSE_SECRET=${LICENSE_SECRET}
      - LICENSE_SALT=${LICENSE_SALT}
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}
      - SECRETS_MASTER_KEY=${SECRETS_MASTER_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - MODEL_DIR=/data/models
      - METRICS_MIN_TRADES_FOR_SHARPE=${METRICS_MIN_TRADES_FOR_SHARPE:-30}
      - ANALYTICS_PAGE_SIZE=${ANALYTICS_PAGE_SIZE:-100}
      - SMC_MAX_CANDLES=${SMC_MAX_CANDLES:-1000}
    volumes:
      - model_data:/data/models
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # BUG-P7 FIX: Telegram bot as separate service
  # Isolated restart policy — bot crash does not affect API
  telegram-bot:
    build:
      context: .
      dockerfile: backend/Dockerfile.bot
    environment:
      - APP_ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TELEGRAM_ADMIN_IDS=${TELEGRAM_ADMIN_IDS:-[]}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - API_BASE_URL=http://api:8000
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - MT5_DEMO_MODE=${MT5_DEMO_MODE:-true}
      - MODEL_DIR=/data/models
    volumes:
      - model_data:/data/models
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    depends_on:
      - api
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
  model_data:
