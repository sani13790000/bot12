version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: gv_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gv_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL:-}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
      - ./data:/app/data
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000 --workers 2

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: gv_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:8000
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - api
    volumes:
      - ./logs:/app/logs

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: gv_dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api
    volumes:
      - ./data:/app/data
      - ./models:/app/models

volumes:
  redis_data:
