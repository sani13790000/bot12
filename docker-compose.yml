# Galaxy Vast AI Trading Platform — Production Docker Compose
# All services with health checks, proper restart policies, and named volumes.
version: '3.9'

services:

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: galaxy_redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1000
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - galaxy_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: galaxy_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - model_data:/app/models
      - log_data:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - galaxy_net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Telegram Bot ──────────────────────────────────────────────────────────
  telegram_bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: galaxy_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - API_BASE_URL=http://api:8000
    volumes:
      - log_data:/app/logs
    depends_on:
      api:
        condition: service_healthy
    networks:
      - galaxy_net
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── Streamlit Dashboard ────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: galaxy_dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - galaxy_net
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: galaxy_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - galaxy_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
    driver: local
  model_data:
    driver: local
  log_data:
    driver: local

networks:
  galaxy_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
